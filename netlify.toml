[build]
  base = "website"
  publish = "."

# Clean URLs: /privacy-policy → /privacy-policy.html
[[redirects]]
  from = "/privacy-policy"
  to = "/privacy-policy.html"
  status = 200

[[redirects]]
  from = "/support"
  to = "/support.html"
  status = 200

[[redirects]]
  from = "/terms"
  to = "/terms.html"
  status = 200
